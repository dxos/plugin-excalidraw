name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - run: pnpm build

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add package.json
          git commit -m "chore: release ${VERSION}"
          git tag "${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${VERSION}"

      # GitHub release asset names cannot contain `/`, so multi-asset bundles
      # (`index.mjs` + sibling chunks/CSS) need their paths flattened. The
      # registry service (`@dxos/registry-service`'s `decodeAssetName`) reverses
      # this on hydration — the encoding is duplicated by value because the
      # publisher has no convenient way to import from that package.
      #
      # `find` enumerates every regular file under `dist/`, computes
      # `<rel-path>` (the bundle-relative path the manifest already records),
      # and copies the file to `dist/upload/<encoded>` where `<encoded>` is the
      # path with `/` swapped for `+`. `+` was chosen because vite/rollup chunk
      # hashes are restricted to `[A-Za-z0-9_-]`, so the swap can't collide with
      # a real chunk filename and round-trip cleanly through the registry's
      # `decodeAssetName`. Top-level files (`manifest.json`, `index.mjs`) keep
      # their original names — the swap is a no-op for them.
      - name: Stage release assets with `/`→`+` path encoding
        run: |
          mkdir -p dist/upload
          find dist -type f -not -path 'dist/upload/*' | while read -r src; do
            rel="${src#dist/}"
            encoded="${rel//\//+}"
            cp "${src}" "dist/upload/${encoded}"
          done

      # Two-step: create the release first (no assets), then upload assets
      # serially with a small inter-request sleep. Multi-asset bundles can run
      # to ~200+ files; passing them all to `gh release create` triggers
      # GitHub's secondary rate limit on content-creating requests
      # (`HTTP 403: You have exceeded a secondary rate limit`) because the gh
      # CLI uploads in parallel. Serial + 1s sleep keeps us under the limit
      # at a worst-case ~3.5min upload for 200 files — well below the
      # 30min job timeout.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

      - name: Upload release assets (throttled)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          for asset in dist/upload/*; do
            gh release upload "${TAG}" "${asset}"
            sleep 1
          done
